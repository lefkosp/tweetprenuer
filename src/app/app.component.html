<div class="test-container">
  <div class="main-container">
    @if (isSubmitting){
    <app-loader />
    } @else { @if (!parsedResponse) {
    <div class="x-form-container" [formGroup]="xForm">
      <div class="header">
        <!-- <div class="logo">
          <mat-icon class="x-icon">trending_up</mat-icon>
        </div> -->
        <h1>who are you?</h1>
        <p class="subtitle">
          drop your 𝕏 handle & I'll cook up a business card just for you
        </p>
      </div>

      <div class="content">
        <div class="input-wrapper">
          <mat-form-field class="input-group" appearance="fill">
            <mat-label>Username</mat-label>
            <span matPrefix class="prefix">&#64;</span>
            <input
              matInput
              id="username"
              type="text"
              formControlName="xUsername"
              placeholder="elonmusk"
            />
            <mat-hint
              >Enter your X (Twitter) username without the &#64;
              symbol</mat-hint
            >
          </mat-form-field>
        </div>
      </div>

      <div class="actions">
        <button mat-raised-button color="primary" (click)="submitUsername()">
          <mat-icon>outdoor_grill</mat-icon>
          Cook
        </button>
      </div>

      <div class="features">
        <div class="feature">
          <mat-icon>psychology</mat-icon>
          <span>AI-Powered</span>
        </div>
        <div class="feature">
          <mat-icon>person_outline</mat-icon>
          <span>Personalized</span>
        </div>
        <div class="feature">
          <mat-icon>bolt</mat-icon>
          <span>Instant</span>
        </div>
      </div>
    </div>
    } @else {
    <app-idea
      [profileImage]="parsedResponse.profileImage"
      [username]="parsedResponse.username"
      [followers]="parsedResponse.followers"
      [tweets]="parsedResponse.tweets"
      [businessIdea]="parsedResponse.businessIdea"
    ></app-idea>
    } }
  </div>
  @if (parsedResponse) {
  <button
    mat-raised-button
    color="accent"
    class="download-btn"
    (click)="downloadScreenshot()"
  >
    <mat-icon>download</mat-icon>
    Get your business card
  </button>
  }
</div>
