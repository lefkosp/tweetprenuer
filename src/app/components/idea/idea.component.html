<div
  class="business-card"
  [ngStyle]="{
    'background-color': businessIdea.colorTheme.background,
    'border-color': businessIdea.colorTheme.border,
    color: businessIdea.colorTheme.text
  }"
>
  <!-- Top-Right Icon (Optional) -->
  <div class="corner-icon">💡</div>

  <!-- Left Section: Profile Image -->
  <div class="profile-section">
    <img [src]="profileImage" alt="Profile Image" class="profile-image" />
  </div>

  <!-- Right Section: Business Info -->
  <div class="info-section">
    <div class="header">
      <h2 class="username">{{ username }}</h2>
      <p class="followers">{{ followers | number }} Followers</p>
    </div>

    <h1 class="idea-title">{{ businessIdea.catchyName }}</h1>
    <p class="idea-description">{{ businessIdea.whatWeDo }}</p>
    <p class="idea-tagline">“{{ businessIdea.tagline }}”</p>
  </div>

  <div class="made-by">tweetpreneuer.net 🤖</div>
</div>
